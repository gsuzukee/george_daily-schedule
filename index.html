<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Blueprint</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-database-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #F5F5F7;
  --bg2:     #FFFFFF;
  --bg3:     #EBEBF0;
  --text:    #1D1D1F;
  --text2:   #86868B;
  --accent:  #5856D6;
  --green:   #34C759;
  --george:  #007AFF;
  --olivia:  #FF6B9D;
  --border:  rgba(0,0,0,0.07);
  --shadow:  0 1px 4px rgba(0,0,0,0.07);
  --r:       14px;
  --tab-h:   80px;
}

[data-theme="dark"] {
  --bg:     #000000;
  --bg2:    #1C1C1E;
  --bg3:    #2C2C2E;
  --text:   #F5F5F7;
  --text2:  #86868B;
  --border: rgba(255,255,255,0.09);
  --shadow: 0 1px 4px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 430px; margin: 0 auto; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Welcome ── */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 48px 28px;
}
.wlc-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text2); margin-bottom: 14px; }
.wlc-title { font-size: 36px; font-weight: 700; color: var(--text);
  margin-bottom: 8px; text-align: center; }
.wlc-sub { font-size: 17px; color: var(--text2); margin-bottom: 52px; text-align: center; }
.user-cards { display: flex; gap: 14px; width: 100%; }
.user-card {
  flex: 1; background: var(--bg2); border-radius: 20px;
  border: 1px solid var(--border); padding: 30px 16px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  cursor: pointer; transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: var(--shadow);
}
.user-card:active { transform: scale(0.96); }
.u-avatar {
  width: 68px; height: 68px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px;
}
.u-name { font-size: 18px; font-weight: 700; color: var(--text); }
.u-role { font-size: 12px; color: var(--text2); text-align: center; }

/* ── App Shell ── */
.app { display: none; flex-direction: column; min-height: 100vh; }
.app.on { display: flex; }

/* ── Header ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid var(--border);
}
.hdr-title { font-size: 17px; font-weight: 600; color: var(--text); }
.hdr-right { display: flex; align-items: center; gap: 8px; }

.theme-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--bg2); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.chip {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 12px 5px 7px;
  cursor: pointer; transition: background 0.15s;
}
.chip-av {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.chip-name { font-size: 13px; font-weight: 600; color: var(--text); }

/* ── Tabs ── */
.tab-content { flex: 1; overflow-y: auto; padding-bottom: calc(var(--tab-h) + 8px); }
.tab-panel { display: none; padding: 18px 16px; }
.tab-panel.on { display: block; }

.tab-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; z-index: 100;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  height: var(--tab-h);
}
[data-theme="dark"] .tab-bar { background: rgba(28,28,30,0.88); }

.t-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  background: none; border: none; cursor: pointer; padding: 8px 4px;
}
.t-btn:active { opacity: 0.55; }
.t-icon { font-size: 22px; line-height: 1; }
.t-label { font-size: 10px; font-weight: 500; color: var(--text2); }
.t-btn.on .t-label { color: var(--accent); font-weight: 700; }

/* ── Today ── */
.day-sel {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 14px; margin-bottom: 14px; scrollbar-width: none;
}
.day-sel::-webkit-scrollbar { display: none; }
.d-pill {
  flex-shrink: 0; padding: 7px 15px; border-radius: 99px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--bg2); color: var(--text2);
  transition: all 0.18s; white-space: nowrap;
}
.d-pill.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.prog-card {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 16px 18px;
  margin-bottom: 14px; box-shadow: var(--shadow);
  transition: background 0.3s;
}
.prog-card.done { background: var(--green); border-color: transparent; }
.prog-lbl { font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
.prog-card.done .prog-lbl { color: rgba(255,255,255,0.75); }
.prog-num { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.prog-card.done .prog-num { color: #fff; }
.prog-track { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.35s ease; }
.prog-card.done .prog-fill { background: rgba(255,255,255,0.45); }

/* ── Timeline ── */
.tl { display: flex; flex-direction: column; gap: 3px; }
.tl-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; background: var(--bg2); border-radius: 12px;
  border: 1px solid var(--border); cursor: pointer;
  transition: border-color 0.15s, opacity 0.15s;
}
.tl-item:active { opacity: 0.8; }
.tl-item.done { opacity: 0.5; }
.tl-item.open { border-color: var(--accent); }
.tl-time { font-size: 11px; font-weight: 500; color: var(--text2);
  min-width: 56px; padding-top: 3px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.tl-ico { font-size: 17px; flex-shrink: 0; padding-top: 1px; }
.tl-body { flex: 1; min-width: 0; }
.tl-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.35; }
.tl-name.done { text-decoration: line-through; color: var(--text2); }
.tl-note { font-size: 13px; color: var(--text2); margin-top: 8px;
  line-height: 1.55; display: none; }
.tl-item.open .tl-note { display: block; }
.type-tag {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px;
  text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0;
  align-self: flex-start; margin-top: 3px;
}
.tp-together { background: rgba(0,122,255,0.10);  color: #007AFF; }
.tp-solo     { background: rgba(255,149,0,0.12);   color: #FF9500; }
.tp-work     { background: rgba(134,134,139,0.14); color: #86868B; }
.tp-late     { background: rgba(88,86,214,0.12);   color: #5856D6; }
.tp-flex     { background: rgba(255,45,85,0.12);   color: #FF2D55; }
.chk {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border); background: none;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; align-self: center; cursor: pointer;
  transition: all 0.18s; font-size: 13px; color: #fff; font-weight: 700;
}
.chk.done { background: var(--green); border-color: var(--green); }

/* ── Progress Tab ── */
.rng-sel { display: flex; gap: 5px; margin-bottom: 14px; }
.rng-pill {
  flex: 1; padding: 7px 4px; text-align: center; font-size: 13px; font-weight: 500;
  border-radius: 9px; background: var(--bg2); color: var(--text2);
  border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
}
.rng-pill.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.chart-card {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 16px;
  margin-bottom: 14px; box-shadow: var(--shadow);
}
.chart-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.chart-ttl { font-size: 15px; font-weight: 600; color: var(--text); }
.legend { display: flex; gap: 14px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat-c {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 14px; box-shadow: var(--shadow);
}
.stat-lbl { font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
.stat-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-val { font-size: 15px; font-weight: 600; color: var(--text); }

/* ── Plans Tab ── */
.plan-c {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 16px;
  margin-bottom: 10px; box-shadow: var(--shadow);
  cursor: pointer; transition: border-color 0.15s;
}
.plan-c.open { border-color: var(--accent); }
.plan-hdr { display: flex; align-items: center; justify-content: space-between; }
.plan-ttl { font-size: 17px; font-weight: 600; color: var(--text); }
.plan-times { font-size: 12px; color: var(--text2); margin-top: 3px; }
.plan-chev { font-size: 11px; color: var(--text2); transition: transform 0.2s; }
.plan-c.open .plan-chev { transform: rotate(180deg); }
.plan-body { display: none; margin-top: 12px; }
.plan-c.open .plan-body { display: block; }
.plan-desc { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 12px; }
.mini-tl { display: flex; flex-direction: column; gap: 7px; }
.mi { display: flex; gap: 10px; align-items: flex-start; }
.mi-t { font-size: 11px; color: var(--text2); min-width: 50px;
  font-variant-numeric: tabular-nums; padding-top: 1px; flex-shrink: 0; }
.mi-tx { font-size: 13px; color: var(--text); line-height: 1.4; }

/* ── Rules Tab ── */
.sec-hdr { font-size: 20px; font-weight: 700; color: var(--text); margin: 6px 0 12px; }
.rule-c {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 14px 15px;
  margin-bottom: 8px; display: flex; gap: 12px; box-shadow: var(--shadow);
}
.rule-ico { font-size: 20px; flex-shrink: 0; }
.rule-ttl { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.rule-dsc { font-size: 13px; color: var(--text2); line-height: 1.5; }
.proto-c {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 14px 15px;
  margin-bottom: 8px; cursor: pointer; box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.proto-c.open { border-color: var(--accent); }
.proto-hdr { display: flex; align-items: center; justify-content: space-between; }
.proto-left { display: flex; align-items: center; gap: 9px; }
.proto-ttl { font-size: 15px; font-weight: 600; color: var(--text); }
.proto-steps { display: none; margin-top: 10px; }
.proto-c.open .proto-steps { display: block; }
.proto-step { display: flex; gap: 8px; font-size: 13px; color: var(--text2);
  line-height: 1.5; padding: 3px 0; }
.proto-step::before { content: '→'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
.dec-c {
  background: var(--bg2); border-radius: var(--r);
  border: 1px solid var(--border); padding: 13px 15px;
  margin-bottom: 8px; box-shadow: var(--shadow);
}
.dec-q { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.dec-a { font-size: 13px; color: var(--text2); }

/* ── Sheet ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.35); z-index: 200;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: flex-end;
}
.overlay.on { display: flex; }
.sheet {
  background: var(--bg2); border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(env(safe-area-inset-bottom) + 24px);
  width: 100%; max-width: 430px; margin: 0 auto;
}
.sheet-ttl { font-size: 12px; font-weight: 700; color: var(--text2);
  text-align: center; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1px; }
.sheet-users { display: flex; gap: 12px; }
.sh-user {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 16px 8px; border-radius: 16px; background: var(--bg3);
  cursor: pointer; transition: all 0.18s; border: 2px solid transparent;
}
.sh-user:active { transform: scale(0.97); }
.sh-user.on { background: var(--bg2); border-color: var(--accent); }
.sh-av {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #fff;
}
.sh-name { font-size: 15px; font-weight: 600; color: var(--text); }

/* ── Streak Cards ── */
.streak-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
}
.streak-c {
  background: var(--bg2); border-radius: var(--r);
  border: 1.5px solid var(--border); padding: 14px 14px 12px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.streak-c.leader { border-color: var(--accent); }
.streak-c.george-c { border-color: rgba(0,122,255,0.3); }
.streak-c.olivia-c { border-color: rgba(255,107,157,0.3); }
.streak-name { font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text2); margin-bottom: 6px; }
.streak-val { display: flex; align-items: baseline; gap: 4px; }
.streak-fire { font-size: 22px; line-height: 1; }
.streak-fire.milestone { animation: fireFlare 0.6s ease infinite alternate; }
@keyframes fireFlare {
  from { transform: scale(1);   filter: brightness(1); }
  to   { transform: scale(1.2); filter: brightness(1.3) drop-shadow(0 0 4px orange); }
}
.streak-num { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
.streak-unit { font-size: 12px; color: var(--text2); font-weight: 500; }
.streak-best { font-size: 11px; color: var(--text2); margin-top: 5px; }
.sync-badge {
  grid-column: 1 / -1; text-align: center;
  font-size: 12px; font-weight: 600; color: var(--accent);
  background: rgba(88,86,214,0.08); border-radius: 99px;
  padding: 6px 12px; margin-top: -4px;
}

/* ── Quick Pick ── */
.qp-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  align-items: flex-end;
}
.qp-overlay.on { display: flex; }
.qp-sheet {
  background: var(--bg2); border-radius: 28px 28px 0 0;
  padding: 24px 20px calc(env(safe-area-inset-bottom) + 28px);
  width: 100%; max-width: 430px; margin: 0 auto;
  max-height: 92vh; overflow-y: auto;
}
.qp-eyebrow { font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; }
.qp-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
.qp-cards { display: flex; flex-direction: column; gap: 9px; }
.qp-card {
  background: var(--bg3); border-radius: 14px;
  border: 2px solid transparent; padding: 14px 16px;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.qp-card:active { transform: scale(0.98); }
.qp-card.hi { border-color: var(--accent); background: var(--bg2);
  box-shadow: 0 0 0 4px rgba(88,86,214,0.08); }
.qp-card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.qp-card-desc { font-size: 12px; color: var(--text2); }
.qp-wake { font-size: 11px; font-weight: 600; color: var(--accent);
  background: rgba(88,86,214,0.1); padding: 3px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
.qp-weekend { text-align: center; padding: 10px 0 4px; }
.qp-wknd-ico { font-size: 52px; margin-bottom: 14px; }
.qp-wknd-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.qp-wknd-desc { font-size: 15px; color: var(--text2); line-height: 1.65; margin-bottom: 24px; }
.qp-btn {
  width: 100%; padding: 15px; border-radius: 14px;
  background: var(--accent); color: #fff; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s;
}
.qp-btn:active { opacity: 0.82; }
.qp-sr-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.qp-sr-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; line-height: 1.55; }
.qp-sr-row {
  background: var(--bg3); border-radius: 12px; padding: 12px 14px;
  margin-bottom: 8px;
}
.qp-sr-day { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.qp-sr-opts { display: flex; gap: 6px; flex-wrap: wrap; }
.qp-sr-opt {
  padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
  cursor: pointer; transition: all 0.15s;
}
.qp-sr-opt.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Anim ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.fu { animation: fadeUp 0.28s ease both; }
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.slide-up { animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1) both; }
</style>
</head>
<body>

<!-- ── Welcome ── -->
<div class="welcome" id="welcome">
  <div class="wlc-eyebrow">Daily Blueprint</div>
  <div class="wlc-title">Good morning ☀️</div>
  <div class="wlc-sub">Who's checking in?</div>
  <div class="user-cards">
    <div class="user-card" onclick="selectUser('george')">
      <div class="u-avatar" style="background:#007AFF">G</div>
      <div class="u-name">George</div>
      <div class="u-role">Uber Eats AE</div>
    </div>
    <div class="user-card" onclick="selectUser('olivia')">
      <div class="u-avatar" style="background:#FF6B9D">O</div>
      <div class="u-name">Olivia</div>
      <div class="u-role">Stripe SWE</div>
    </div>
  </div>
</div>

<!-- ── App ── -->
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-title" id="hdrTitle">Today</div>
    <div class="hdr-right">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <div class="chip" onclick="openSheet()">
        <div class="chip-av" id="chipAv"></div>
        <div class="chip-name" id="chipName"></div>
      </div>
    </div>
  </div>

  <div class="tab-content">
    <div class="tab-panel on" id="p-today">
      <div class="day-sel" id="daySel"></div>
      <div class="prog-card" id="progCard">
        <div class="prog-lbl">Today's Progress</div>
        <div class="prog-num" id="progNum">—</div>
        <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <div id="streakRowToday"></div>
      <div class="tl" id="tlWrap"></div>
    </div>

    <div class="tab-panel" id="p-progress">
      <div id="streakRowProgress"></div>

// ── Streaks ──
let streakCache = { george: null, olivia: null };

function isWeekday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  return day >= 1 && day <= 5; // Mon–Fri
}

function prevWeekday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  do { d.setDate(d.getDate() - 1); } while (d.getDay() === 0 || d.getDay() === 6);
  return d.toISOString().split('T')[0];
}

async function updateStreak(u) {
  if (!isWeekday(todayKey)) return; // weekends don't affect streaks
  const checkinSnap = await db.ref(`/users/${u}/checkins/${todayKey}`).once('value');
  const pct = checkinSnap.val()?.percentage ?? 0;
  if (pct === 0) return; // don't update until they've done something today

  const streakSnap = await db.ref(`/users/${u}/streak`).once('value');
  let { current = 0, best = 0, lastCompletedDate = null } = streakSnap.val() || {};

  const expectedPrev = prevWeekday(todayKey);
  const passed = pct >= 70;

  if (lastCompletedDate === todayKey) {
    // Already recorded today — just check if best needs updating
    if (passed && current > best) {
      best = current;
      await db.ref(`/users/${u}/streak`).update({ best });
    }
    return;
  }

  if (passed) {
    // Check if yesterday's weekday was completed to extend streak
    if (lastCompletedDate === expectedPrev) {
      current += 1;
    } else {
      current = 1; // streak broken or first ever
    }
    if (current > best) best = current;
    await db.ref(`/users/${u}/streak`).set({ current, best, lastCompletedDate: todayKey });
  } else {
    // Below 70% — reset streak
    current = 0;
    await db.ref(`/users/${u}/streak`).set({ current, best, lastCompletedDate: null });
  }

  streakCache[u] = { current, best };
  renderStreakCards();
}

async function loadStreaks() {
  const [gs, os] = await Promise.all([
    db.ref('/users/george/streak').once('value'),
    db.ref('/users/olivia/streak').once('value'),
  ]);
  streakCache.george = gs.val() || { current: 0, best: 0 };
  streakCache.olivia = os.val() || { current: 0, best: 0 };
  renderStreakCards();
}

function streakCardHTML(name, color, data, isLeader) {
  const cur = data?.current ?? 0;
  const best = data?.best ?? 0;
  const milestone = cur >= 7;
  return `
    <div class="streak-c ${isLeader ? 'leader' : ''}">
      <div class="streak-name" style="color:${color}">${name}</div>
      <div class="streak-val">
        <span class="streak-fire ${milestone ? 'milestone' : ''}">🔥</span>
        <span class="streak-num">${cur}</span>
        <span class="streak-unit">day${cur !== 1 ? 's' : ''}</span>
      </div>
      <div class="streak-best">Best: ${best} day${best !== 1 ? 's' : ''}</div>
    </div>`;
}

function renderStreakCards() {
  const g = streakCache.george, o = streakCache.olivia;
  const gc = g?.current ?? 0, oc = o?.current ?? 0;
  const gLeader = gc > oc, oLeader = oc > gc, inSync = gc === oc && gc > 0;
  const html = `
    <div class="streak-row">
      ${streakCardHTML('George', '#007AFF', g, gLeader)}
      ${streakCardHTML('Olivia', '#FF6B9D', o, oLeader)}
      ${inSync ? '<div class="sync-badge">🔗 In sync!</div>' : ''}
    </div>`;
  const t = document.getElementById('streakRowToday');
  const p = document.getElementById('streakRowProgress');
  if (t) t.innerHTML = html;
  if (p) p.innerHTML = html;
}

// ── Quick Pick ──
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';
  return 'Good evening';
}

function isFriday()         { return new Date().getDay() === 5; }
function isSaturday()       { return new Date().getDay() === 6; }
function isSunday()         { return new Date().getDay() === 0; }
function isSundayEvening()  { return isSunday() && new Date().getHours() >= 18; }
function isWeekend()        { return isSaturday() || isSunday(); }

function showQuickPick() {
  const name = user === 'george' ? 'George' : 'Olivia';
  const sheet = document.getElementById('qpSheet');
  const overlay = document.getElementById('qpOverlay');

  if (isSundayEvening()) {
    sheet.innerHTML = buildSundayReset();
  } else if (isWeekend()) {
    sheet.innerHTML = buildWeekendMsg(name);
  } else {
    sheet.innerHTML = buildDayPicker(name);
  }
  overlay.classList.add('on');
}

function buildDayPicker(name) {
  const QP_CARDS = [
    { key:'earlyNormal', label:'Early Day',         desc:'Gym + career growth morning · George cooks',  wake:'Wake 6 AM' },
    { key:'earlyClimb',  label:'Early + Climb/Dance',desc:'No gym · Deep career block · Activity tonight', wake:'Wake 6 AM' },
    { key:'lateNormal',  label:'Late Day',           desc:'Nothing before work · Everything tonight',   wake:'Wake 8 AM' },
    { key:'lateClimb',   label:'Late + Climb/Dance', desc:'Nothing before work · Activity tonight',     wake:'Wake 8 AM' },
    { key:'friday',      label:'Friday',             desc:'Front-load gym + career · Free evening',     wake:'Wake 6 AM' },
  ];
  const friday = isFriday();
  return `
    <div class="qp-eyebrow">${greeting()}, ${name}</div>
    <div class="qp-title">What type of day is today?</div>
    <div class="qp-cards">
      ${QP_CARDS.map(c => `
        <div class="qp-card ${(c.key === 'friday' && friday) ? 'hi' : ''}"
             onclick="pickFromQP('${c.key}')">
          <div>
            <div class="qp-card-name">${c.label}${c.key==='friday'&&friday?' ⭐':''}</div>
            <div class="qp-card-desc">${c.desc}</div>
          </div>
          <div class="qp-wake">${c.wake}</div>
        </div>`).join('')}
    </div>`;
}

function buildWeekendMsg(name) {
  return `
    <div class="qp-weekend">
      <div class="qp-wknd-ico">🌤️</div>
      <div class="qp-wknd-title">It's the weekend!</div>
      <div class="qp-wknd-desc">No set schedule today, ${name}. Enjoy your day.<br><br>
        Remember the body clock rules:<br>
        Bed by 1:30 AM · Up by 10 AM<br>
        Sunday night: back to weekday schedule.</div>
      <button class="qp-btn" onclick="closeQP()">Got it 👍</button>
    </div>`;
}

function buildSundayReset() {
  const days = ['Monday','Tuesday','Wednesday','Thursday'];
  const isGeorge = user === 'george';
  const opts = isGeorge
    ? ['Regular','Climbing']
    : ['Regular','Dance'];
  return `
    <div class="qp-sr-title">Sunday Reset 🔄</div>
    <div class="qp-sr-sub">Plan your week! Which days will be ${isGeorge ? 'climbing' : 'dance'} days?</div>
    <div id="srDays">
      ${days.map(day => `
        <div class="qp-sr-row">
          <div class="qp-sr-day">${day}</div>
          <div class="qp-sr-opts">
            ${opts.map(opt => `
              <div class="qp-sr-opt ${(weekPlan[day.toLowerCase()]||'regular') === opt.toLowerCase() ? 'on' : ''}"
                   onclick="setSRDay('${day.toLowerCase()}','${opt.toLowerCase()}',this)">
                ${opt}
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>
    <button class="qp-btn" style="margin-top:12px" onclick="saveSundayReset()">Save Week Plan</button>`;
}

function setSRDay(day, val, el) {
  weekPlan[day] = val;
  el.closest('.qp-sr-opts').querySelectorAll('.qp-sr-opt').forEach(o => o.classList.remove('on'));
  el.classList.add('on');
}

function saveSundayReset() {
  db.ref(`/users/${user}/weekPlan`).set(weekPlan);
  closeQP();
}

function pickFromQP(key) {
  dayType = key;
  checks = {};
  expanded = {};
  closeQP();
  save();
  renderToday();
}

function closeQP() {
  document.getElementById('qpOverlay').classList.remove('on');
}

function save() {
  if (!user) return;
  const tasks = S[dayType];
  const done = Object.values(checks).filter(Boolean).length;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
  refToday(user).set({
    dayType, tasks: checks, percentage: pct,
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  }).then(() => updateStreak(user));
}

// ── Today ──
function renderToday() {
  // Day selector
  document.getElementById('daySel').innerHTML = DAY_TYPES.map(d =>
    `<div class="d-pill ${d.key === dayType ? 'on' : ''}" onclick="pickDay('${d.key}')">${d.label}</div>`
  ).join('');
  renderTodayBody();
}

function pickDay(key) {
  dayType = key;
  checks = {};
  expanded = {};
  save();
  renderToday();
}

function renderTodayBody() {
  const tasks = S[dayType];
  const done = Object.values(checks).filter(Boolean).length;
  const total = tasks.length;
  const pct = total ? Math.round(done / total * 100) : 0;

  const card = document.getElementById('progCard');
  card.classList.toggle('done', pct === 100);
  document.getElementById('progNum').textContent =
    pct === 100 ? 'All done! 🎉' : `${done} / ${total} tasks · ${pct}%`;
  document.getElementById('progFill').style.width = pct + '%';

  document.getElementById('tlWrap').innerHTML = tasks.map((item, i) => {
    const isDone = !!checks[i];
    const isOpen = !!expanded[i];
    const activity = user === 'george' ? item.g : item.o;
    return `
      <div class="tl-item ${isDone ? 'done' : ''} ${isOpen ? 'open' : ''} fu"
           onclick="toggleExpand(${i})" style="animation-delay:${i * 0.018}s">
        <div class="tl-time">${item.t}</div>
        <div class="tl-ico">${item.i}</div>
        <div class="tl-body">
          <div class="tl-name ${isDone ? 'done' : ''}">${activity}</div>
          ${item.n ? `<div class="tl-note">${item.n.replace(/\n/g,'<br>')}</div>` : ''}
        </div>
        <span class="type-tag tp-${item.tp}">${item.tp}</span>
        <div class="chk ${isDone ? 'done' : ''}" onclick="toggleCheck(event,${i})">${isDone ? '✓' : ''}</div>
      </div>`;
  }).join('');
}

function toggleExpand(i) {
  expanded[i] = !expanded[i];
  const el = document.querySelectorAll('.tl-item')[i];
  if (el) el.classList.toggle('open', !!expanded[i]);
}
function toggleCheck(e, i) {
  e.stopPropagation();
  checks[i] = !checks[i];
  renderTodayBody();
  save();
}

// ── Progress ──
function renderProgressTab() {
  const ranges = ['1W','2W','1M','3M','All'];
  document.getElementById('rngSel').innerHTML = ranges.map(r =>
    `<button class="rng-pill ${r === range ? 'on' : ''}" onclick="pickRange('${r}')">${r}</button>`
  ).join('');
  loadChartData();
}
function pickRange(r) { range = r; renderProgressTab(); }
function rangeLimit(r) { return {'1W':7,'2W':14,'1M':30,'3M':90,'All':365}[r] || 7; }

async function loadChartData() {
  const limit = rangeLimit(range);
  const [gs, os] = await Promise.all([
    db.ref('/users/george/checkins').orderByKey().limitToLast(limit).once('value'),
    db.ref('/users/olivia/checkins').orderByKey().limitToLast(limit).once('value'),
  ]);
  const gd = gs.val() || {}, od = os.val() || {};
  const dates = [...new Set([...Object.keys(gd),...Object.keys(od)])].sort();
  const gPts = dates.map(d => gd[d]?.percentage ?? null);
  const oPts = dates.map(d => od[d]?.percentage ?? null);
  const labels = dates.map(d => { const [,m,day] = d.split('-'); return `${+m}/${+day}`; });
  drawChart(labels, gPts, oPts);
  renderStats(gd, od);
  renderDayTypes(gd, od);
}

function drawChart(labels, gPts, oPts) {
  const ctx = document.getElementById('chart').getContext('2d');
  if (chartInst) chartInst.destroy();
  const dark = document.documentElement.dataset.theme === 'dark';
  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'George', data:gPts, borderColor:'#007AFF', backgroundColor:'rgba(0,122,255,0.08)',
          tension:0.4, pointRadius:4, pointBackgroundColor:'#007AFF',
          pointBorderColor: dark ? '#1C1C1E' : '#fff', pointBorderWidth:1.5,
          fill:false, spanGaps:true },
        { label:'Olivia', data:oPts, borderColor:'#FF6B9D', backgroundColor:'rgba(255,107,157,0.08)',
          tension:0.4, pointRadius:4, pointBackgroundColor:'#FF6B9D',
          pointBorderColor: dark ? '#1C1C1E' : '#fff', pointBorderWidth:1.5,
          fill:false, spanGaps:true },
      ]
    },
    options: {
      responsive:true, plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c => `${c.dataset.label}: ${c.parsed.y ?? 'N/A'}%` }}},
      scales:{
        x:{ grid:{display:false}, ticks:{color:'#86868B', font:{size:11}, maxRotation:0} },
        y:{ min:0, max:100,
          grid:{ color: dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)' },
          ticks:{ color:'#86868B', font:{size:11}, callback: v => v+'%' } }
      }
    }
  });
}

function renderStats(gd, od) {
  const avg = d => {
    const v = Object.values(d).map(x => x?.percentage).filter(x => x != null);
    return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null;
  };
  const streak = d => {
    let s = 0;
    for (const k of Object.keys(d).sort().reverse()) {
      if ((d[k]?.percentage ?? 0) > 0) s++; else break;
    }
    return s;
  };
  const best = d => {
    let bv = null, bk = null;
    for (const [k,v] of Object.entries(d)) {
      if (bv === null || (v?.percentage ?? 0) > bv) { bv = v?.percentage ?? 0; bk = k; }
    }
    if (!bk) return '—';
    const [,m,day] = bk.split('-');
    return `${bv}% on ${+m}/${+day}`;
  };
  const ga = avg(gd), oa = avg(od);
  const gs = streak(gd), os = streak(od);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-c">
      <div class="stat-lbl">Avg Completion</div>
      <div class="stat-row"><div class="stat-dot" style="background:#007AFF"></div><div class="stat-val">${ga!=null?ga+'%':'—'}</div></div>
      <div class="stat-row"><div class="stat-dot" style="background:#FF6B9D"></div><div class="stat-val">${oa!=null?oa+'%':'—'}</div></div>
    </div>
    <div class="stat-c">
      <div class="stat-lbl">Current Streak</div>
      <div class="stat-row"><div class="stat-dot" style="background:#007AFF"></div><div class="stat-val">${gs} day${gs!==1?'s':''}</div></div>
      <div class="stat-row"><div class="stat-dot" style="background:#FF6B9D"></div><div class="stat-val">${os} day${os!==1?'s':''}</div></div>
    </div>
    <div class="stat-c" style="grid-column:1/-1">
      <div class="stat-lbl">Best Day</div>
      <div class="stat-row"><div class="stat-dot" style="background:#007AFF"></div><div class="stat-val" style="font-size:13px">George: ${best(gd)}</div></div>
      <div class="stat-row"><div class="stat-dot" style="background:#FF6B9D"></div><div class="stat-val" style="font-size:13px">Olivia: ${best(od)}</div></div>
    </div>`;
}

function renderDayTypes(gd, od) {
  const cnt = {};
  for (const v of [...Object.values(gd),...Object.values(od)]) {
    if (v?.dayType) cnt[v.dayType] = (cnt[v.dayType]||0) + 1;
  }
  const lbl = {earlyNormal:'Early Day',earlyClimb:'Early+Climb',lateNormal:'Late Day',lateClimb:'Late+Climb',friday:'Friday'};
  document.getElementById('dtBreakdown').innerHTML = Object.entries(cnt).length
    ? Object.entries(cnt).map(([k,v]) => `
        <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text)">${lbl[k]||k}</span>
          <span style="color:var(--text2);font-weight:600">${v} day${v!==1?'s':''}</span>
        </div>`).join('')
    : '<div style="color:var(--text2);font-size:13px;padding:4px 0">No data yet</div>';
}

// ── Plans ──
function renderPlans() {
  document.getElementById('plansWrap').innerHTML = DAY_TYPES.map(dt => {
    const info = PLAN_INFO[dt.key];
    const tasks = S[dt.key];
    return `
      <div class="plan-c" onclick="this.classList.toggle('open')">
        <div class="plan-hdr">
          <div>
            <div class="plan-ttl">${dt.label}</div>
            <div class="plan-times">Wake ${info.wake} · Sleep ${info.sleep}</div>
          </div>
          <span class="plan-chev">▼</span>
        </div>
        <div class="plan-body">
          <div class="plan-desc">${info.desc}</div>
          <div class="mini-tl">
            ${tasks.map(item => `
              <div class="mi">
                <div class="mi-t">${item.t}</div>
                <div class="mi-tx">${item.i} ${item.g}${item.g!==item.o
                  ? ` · <span style="color:#FF6B9D">${item.o}</span>` : ''}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Rules ──
function renderRules() {
  document.getElementById('rulesWrap').innerHTML = `
    <div class="sec-hdr">Ground Rules</div>
    ${RULES.map(r => `
      <div class="rule-c fu">
        <div class="rule-ico">${r.i}</div>
        <div><div class="rule-ttl">${r.t}</div><div class="rule-dsc">${r.d}</div></div>
      </div>`).join('')}
    <div class="sec-hdr" style="margin-top:22px">If-Then Protocols</div>
    ${PROTOCOLS.map(p => `
      <div class="proto-c" onclick="this.classList.toggle('open')">
        <div class="proto-hdr">
          <div class="proto-left">
            <span style="font-size:18px">${p.i}</span>
            <span class="proto-ttl">${p.t}</span>
          </div>
          <span style="color:var(--text2);font-size:11px">▼</span>
        </div>
        <div class="proto-steps">
          ${p.s.map(s => `<div class="proto-step">${s}</div>`).join('')}
        </div>
      </div>`).join('')}
    <div class="sec-hdr" style="margin-top:22px">How to Pick Your Day</div>
    ${DECISION.map(d => `
      <div class="dec-c">
        <div class="dec-q">${d.l}</div>
        <div class="dec-a">${d.v}</div>
      </div>`).join('')}`;
}

// ── Init ──
initTheme();
const savedUser = localStorage.getItem('bp_user');
if (savedUser) {
  user = savedUser;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('app').classList.add('on');
  updateChip();
  attachFirebase();
  loadStreaks();
  renderPlans();
  renderRules();
}
</script>
