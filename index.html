<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>George & Olivia — Daily Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --bg2: #12121f;
  --bg3: #1a1a2e;
  --text: #e8e8f0;
  --text-muted: #8888a8;
  --cursed-blue: #4f6df5;
  --cursed-purple: #7c3aed;
  --cursed-glow: #6366f1;
  --rika-pink: #ec4899;
  --energy-green: #10b981;
  --warning-amber: #f59e0b;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --accent: var(--cursed-blue);
  --glow: 0 0 30px rgba(99,102,241,0.15);
}

[data-theme="light"] {
  --bg: #f5f3f0;
  --bg2: #ebe8e4;
  --bg3: #ddd9d4;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --card-bg: rgba(255,255,255,0.7);
  --card-border: rgba(0,0,0,0.08);
  --glow: 0 0 30px rgba(99,102,241,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', 'Zen Kaku Gothic New', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s, color 0.4s;
  overflow-x: hidden;
}

/* ─── Header ─── */
.header { text-align: center; margin-bottom: 24px; }

.header .cursed-label {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--cursed-blue); font-weight: 700; margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(79,109,245,0.5);
}

.header h1 {
  font-size: 28px; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--cursed-blue), var(--cursed-purple), var(--rika-pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  font-size: 13px; opacity: 0.5; line-height: 1.5;
  max-width: 400px; margin: 0 auto;
}

/* ─── Theme Toggle ─── */
.theme-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg3); border: 1.5px solid var(--card-border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: all 0.3s;
  box-shadow: var(--glow);
}
.theme-toggle:hover { transform: scale(1.1); }

/* ─── Tabs ─── */
.tabs {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 20px;
}

.tab {
  padding: 8px 14px; border-radius: 99px;
  border: 1.5px solid var(--card-border);
  background: var(--card-bg); color: var(--text);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}

.tab:hover { border-color: var(--cursed-blue); }

.tab.active {
  border-color: var(--cursed-blue);
  background: var(--cursed-blue); color: #fff;
  box-shadow: 0 0 20px rgba(79,109,245,0.3);
}

/* ─── Yuta Companion ─── */
.yuta-bar {
  background: linear-gradient(135deg, rgba(79,109,245,0.12), rgba(124,58,237,0.08));
  border: 1.5px solid rgba(79,109,245,0.2);
  border-radius: 16px; padding: 14px 18px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--glow); transition: box-shadow 0.4s, transform 0.3s;
  animation: fadeUp 0.5s ease;
}

.yuta-bar.energy-spike {
  box-shadow: 0 0 40px rgba(79,109,245,0.6), 0 0 80px rgba(124,58,237,0.3);
  transform: scale(1.02);
}

.yuta-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #6b8ffb, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative;
  box-shadow: 0 0 20px rgba(99,102,241,0.5), 0 0 40px rgba(99,102,241,0.2);
  animation: avatarBreathe 3s ease-in-out infinite;
}

.yuta-avatar svg { width: 26px; height: 26px; }

@keyframes avatarBreathe {
  0%,100% { box-shadow: 0 0 20px rgba(99,102,241,0.5), 0 0 40px rgba(99,102,241,0.2); }
  50%      { box-shadow: 0 0 35px rgba(99,102,241,0.8), 0 0 70px rgba(124,58,237,0.4); }
}

[data-theme="light"] .yuta-avatar {
  background: radial-gradient(circle at 35% 35%, #fbbf24, #f59e0b);
  animation: avatarBreatheGold 3s ease-in-out infinite;
}

@keyframes avatarBreatheGold {
  0%,100% { box-shadow: 0 0 20px rgba(245,158,11,0.5), 0 0 40px rgba(245,158,11,0.2); }
  50%      { box-shadow: 0 0 35px rgba(245,158,11,0.9), 0 0 70px rgba(251,191,36,0.4); }
}

.yuta-text { flex: 1; min-width: 0; }
.yuta-text .name { font-size: 10px; font-weight: 700; color: var(--cursed-blue); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.yuta-text .quote-jp { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 14px; font-weight: 700; line-height: 1.5; color: var(--text); }
.yuta-text .quote-cn { font-family: 'Noto Sans SC', sans-serif; font-size: 12px; opacity: 0.6; margin-top: 3px; line-height: 1.4; }
.yuta-text .quote-en { font-size: 11px; opacity: 0.4; margin-top: 2px; line-height: 1.4; }

/* ─── Progress Ring ─── */
.progress-section {
  display: flex; align-items: center; gap: 16px;
  background: var(--card-bg); border: 1.5px solid var(--card-border);
  border-radius: 16px; padding: 16px 18px; margin-bottom: 20px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.progress-ring-container {
  flex-shrink: 0; position: relative;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; overflow: visible; min-width: 90px;
}

.cursed-energy-gif {
  width: 28px; height: 28px;
  object-fit: contain;
  opacity: 0;
  transition: width 0.55s cubic-bezier(0.34,1.56,0.64,1),
              height 0.55s cubic-bezier(0.34,1.56,0.64,1),
              filter 0.6s ease,
              opacity 0.5s ease;
  filter: brightness(0.7) saturate(1.2);
  -webkit-mask-image: radial-gradient(ellipse 62% 68% at 50% 50%,
    black 18%, rgba(0,0,0,0.85) 38%,
    rgba(0,0,0,0.4) 58%, transparent 76%);
  mask-image: radial-gradient(ellipse 62% 68% at 50% 50%,
    black 18%, rgba(0,0,0,0.85) 38%,
    rgba(0,0,0,0.4) 58%, transparent 76%);
}

@keyframes gifBurst {
  0%   { transform: scale(1)           rotate(0deg); }
  10%  { transform: scaleX(2.1) scaleY(0.55) rotate(-4deg); }
  25%  { transform: scaleX(0.65) scaleY(1.7)  rotate(3deg);  }
  42%  { transform: scaleX(1.35) scaleY(0.82) rotate(-2deg); }
  58%  { transform: scaleX(0.88) scaleY(1.18) rotate(1deg);  }
  74%  { transform: scaleX(1.08) scaleY(0.95) rotate(0deg);  }
  100% { transform: scale(1)           rotate(0deg); }
}

.gif-burst { animation: gifBurst 0.65s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* Spark particles shot on burst */
.fire-spark {
  position: absolute; border-radius: 50%;
  top: 50%; left: 50%; pointer-events: none; z-index: 20;
}

.progress-pct {
  font-size: 12px; font-weight: 800;
  color: #fff; white-space: nowrap;
  background: rgba(5,3,18,0.82);
  border: 1px solid rgba(99,102,241,0.4);
  border-radius: 99px; padding: 2px 9px;
  text-shadow: 0 0 8px var(--cursed-blue);
  box-shadow: 0 0 10px rgba(99,102,241,0.2);
  flex-shrink: 0;
}

.progress-info { flex: 1; }
.progress-info .label { font-size: 12px; font-weight: 700; color: var(--cursed-blue); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.progress-info .detail { font-size: 13px; opacity: 0.6; line-height: 1.4; }

/* ─── Schedule Blocks ─── */
.schedule { display: flex; flex-direction: column; gap: 6px; }

.plan-info {
  margin-bottom: 14px; padding: 12px 16px; border-radius: 12px;
  font-size: 13px; line-height: 1.6; animation: fadeUp 0.4s ease;
  background: var(--card-bg); border: 1.5px solid var(--card-border);
}

.plan-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 6px; font-size: 12px; }
.plan-meta .plan-label { font-weight: 700; color: var(--cursed-blue); }
.plan-meta span { opacity: 0.5; }

.block {
  border-radius: 14px; padding: 14px 16px;
  cursor: pointer; transition: all 0.2s;
  animation: fadeUp 0.4s ease both;
}

.block:active { transform: scale(0.985); }

.block-header { display: flex; align-items: center; gap: 10px; }
.block-icon { font-size: 20px; flex-shrink: 0; }
.block-content { flex: 1; min-width: 0; }
.block-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; flex-wrap: wrap; }
.block-time { font-size: 11px; font-weight: 700; flex-shrink: 0; }

.block-type {
  font-size: 9px; padding: 2px 7px; border-radius: 99px;
  color: #fff; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}

.block-activity { font-size: 13px; font-weight: 500; line-height: 1.5; }
.person-label { opacity: 0.5; font-size: 11px; }

.block-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.check-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--card-border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.3s; color: var(--text);
}

.check-btn.done {
  border-color: var(--energy-green); background: var(--energy-green); color: #fff;
  box-shadow: 0 0 12px rgba(16,185,129,0.4);
  animation: checkPop 0.4s ease;
}

.block-chevron {
  font-size: 16px; opacity: 0.25; transition: transform 0.25s; flex-shrink: 0;
}
.block-chevron.open { transform: rotate(180deg); }

.block-note {
  margin-top: 0; padding-top: 0; font-size: 12px; line-height: 1.6;
  opacity: 0.7; white-space: pre-line;
  max-height: 0; overflow: hidden; transition: all 0.35s ease;
}

.block-note.open { max-height: 500px; margin-top: 12px; padding-top: 12px; }

/* ─── Type Colors ─── */
.type-together { background: rgba(79,109,245,0.08); border: 1.5px solid rgba(79,109,245,0.2); }
.type-together .block-time { color: var(--cursed-blue); }
.type-together .block-type { background: var(--cursed-blue); }
.type-together .block-note { border-top-color: rgba(79,109,245,0.2); }

.type-solo { background: rgba(245,158,11,0.08); border: 1.5px solid rgba(245,158,11,0.2); }
.type-solo .block-time { color: var(--warning-amber); }
.type-solo .block-type { background: var(--warning-amber); }
.type-solo .block-note { border-top-color: rgba(245,158,11,0.2); }

.type-work { background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.06); }
.type-work .block-time { color: var(--text-muted); }
.type-work .block-type { background: var(--text-muted); }
.type-work .block-note { border-top-color: var(--card-border); }

.type-late { background: rgba(124,58,237,0.08); border: 1.5px solid rgba(124,58,237,0.2); }
.type-late .block-time { color: var(--cursed-purple); }
.type-late .block-type { background: var(--cursed-purple); }
.type-late .block-note { border-top-color: rgba(124,58,237,0.2); }

.type-flex { background: rgba(236,72,153,0.08); border: 1.5px solid rgba(236,72,153,0.2); }
.type-flex .block-time { color: var(--rika-pink); }
.type-flex .block-type { background: var(--rika-pink); }
.type-flex .block-note { border-top-color: rgba(236,72,153,0.2); }

/* ─── Rules & Protocols ─── */
.section-title {
  font-size: 20px; font-weight: 800; margin: 0 0 8px;
  color: var(--cursed-blue);
  text-shadow: 0 0 20px rgba(79,109,245,0.2);
}

.rule-card {
  padding: 14px 16px; border-radius: 14px;
  background: var(--card-bg); border: 1.5px solid var(--card-border);
  margin-bottom: 8px; animation: fadeUp 0.4s ease both;
}

.rule-title { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.rule-title .icon { font-size: 20px; }
.rule-title .name { font-size: 14px; font-weight: 700; }

.rule-desc { font-size: 12.5px; line-height: 1.6; opacity: 0.7; }

.protocol-card {
  padding: 14px 16px; border-radius: 14px;
  background: rgba(16,185,129,0.05); border: 1.5px solid rgba(16,185,129,0.15);
  margin-bottom: 8px; animation: fadeUp 0.4s ease both;
}

.protocol-steps { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.protocol-step { display: flex; gap: 8px; font-size: 12.5px; line-height: 1.5; }
.protocol-step .num { color: var(--energy-green); font-weight: 700; flex-shrink: 0; }
.protocol-step .text { opacity: 0.7; }

/* ─── Screen Time ─── */
.screen-time-card {
  background: linear-gradient(135deg, rgba(236,72,153,0.08), rgba(124,58,237,0.08));
  border: 1.5px solid rgba(236,72,153,0.2);
  border-radius: 16px; padding: 18px; margin-top: 16px;
  animation: fadeUp 0.5s ease;
}

.screen-time-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--rika-pink); }

.st-inputs { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }

.st-input-group { flex: 1; min-width: 120px; }
.st-input-group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

.st-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid var(--card-border); background: var(--card-bg);
  color: var(--text); font-family: inherit; font-size: 16px; font-weight: 600;
  text-align: center; outline: none; transition: border-color 0.2s;
}
.st-input:focus { border-color: var(--rika-pink); }

.st-result {
  text-align: center; font-size: 14px; font-weight: 600;
  padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.03);
  min-height: 40px; display: flex; align-items: center; justify-content: center;
}

/* ─── Decision Tree ─── */
.decision-card {
  margin-top: 16px; padding: 20px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(79,109,245,0.08), rgba(124,58,237,0.08));
  border: 1.5px solid rgba(79,109,245,0.2);
  box-shadow: var(--glow);
}

.decision-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--cursed-blue); }
.tree-item { font-size: 13px; line-height: 1.8; opacity: 0.8; margin-bottom: 6px; }

/* ─── Domain Expansion Overlay ─── */
.domain-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9999; display: none; align-items: center; justify-content: center;
  background: #000;
}
.domain-overlay.active { display: flex; }

#domainCanvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}

.domain-content {
  position: relative; z-index: 2;
  text-align: center; padding: 40px 24px;
  opacity: 0; transition: opacity 0.5s;
}
.domain-content.visible { opacity: 1; }

.domain-announce {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 48px; font-weight: 700; letter-spacing: 8px;
  color: #fff; margin-bottom: 20px;
  text-shadow: 0 0 40px rgba(99,102,241,1), 0 0 80px rgba(99,102,241,0.5);
  opacity: 0; transform: scale(2.5) translateY(-10px); filter: blur(8px);
  transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
}
.domain-announce.snap { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }

.domain-main {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 32px; font-weight: 800; margin-bottom: 12px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 3s ease infinite;
  opacity: 0; transform: translateY(16px);
  transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
}
.domain-main.show { opacity: 1; transform: translateY(0); }

.domain-sub-jp {
  font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 17px;
  color: #a5b4fc; margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(99,102,241,0.5);
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
}
.domain-sub-cn {
  font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
  opacity: 0; color: #c4b5fd; margin-bottom: 4px;
  transform: translateY(10px);
  transition: opacity 0.4s ease 0.35s, transform 0.4s ease 0.35s;
}
.domain-sub-en {
  font-size: 12px; color: rgba(232,232,240,0.45); margin-bottom: 28px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.4s ease 0.5s, transform 0.4s ease 0.5s;
}
.domain-sub-jp.show, .domain-sub-cn.show, .domain-sub-en.show {
  opacity: 1; transform: translateY(0);
}
.domain-sub-cn.show { opacity: 0.65; }

.domain-close {
  padding: 12px 28px; border-radius: 50px;
  border: 1.5px solid rgba(99,102,241,0.6);
  background: rgba(99,102,241,0.08); color: #a5b4fc;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  letter-spacing: 3px;
  box-shadow: 0 0 20px rgba(99,102,241,0.2), inset 0 0 20px rgba(99,102,241,0.05);
  transition: all 0.3s;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.4s ease 0.65s, transform 0.4s ease 0.65s, background 0.3s, box-shadow 0.3s;
}
.domain-close.show { opacity: 1; transform: translateY(0); }
.domain-close:hover {
  background: rgba(99,102,241,0.25);
  box-shadow: 0 0 30px rgba(99,102,241,0.5);
}

/* ─── Animations ─── */
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 15px rgba(99,102,241,0.4); } 50% { box-shadow: 0 0 25px rgba(99,102,241,0.7); } }
@keyframes checkPop { 0% { transform:scale(1); } 50% { transform:scale(1.3); } 100% { transform:scale(1); } }
@keyframes domainExpand { 0% { opacity:0; transform:scale(0.5); } 50% { opacity:1; transform:scale(1.05); } 100% { transform:scale(1); } }
@keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
@keyframes gradientShift { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }

/* ─── Particle Canvas ─── */
#particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
body > *:not(#particles) { position:relative; z-index:1; }

/* ─── Motivation Tab ─── */
.motiv-hero {
  position: relative; border-radius: 20px; overflow: hidden;
  margin-bottom: 20px; min-height: 320px;
  display: flex; flex-direction: column; justify-content: flex-end;
  animation: fadeUp 0.5s ease;
}

.motiv-hero-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  opacity: 0.35;
}

.motiv-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(5,3,18,0.75) 60%, rgba(5,3,18,0.97) 100%);
}

.motiv-hero-content {
  position: relative; z-index: 2; padding: 28px 22px 24px;
  text-align: center;
}

.motiv-label {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
  color: var(--cursed-blue); font-weight: 700; margin-bottom: 16px;
  text-shadow: 0 0 20px rgba(79,109,245,0.8);
}

.motiv-mission-jp {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 20px; font-weight: 700; line-height: 1.6;
  color: #fff; margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(99,102,241,0.9), 0 0 60px rgba(99,102,241,0.4);
}

.motiv-mission-cn {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px; line-height: 1.6; color: #a5b4fc;
  margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(99,102,241,0.6);
}

.motiv-mission-en {
  font-size: 12px; color: rgba(232,232,240,0.5); line-height: 1.6;
  font-style: italic;
}

.motiv-card {
  border-radius: 16px; padding: 18px;
  background: var(--card-bg); border: 1.5px solid var(--card-border);

  try{
    const saved=localStorage.getItem('blueprint_state');
    if(saved){const d=JSON.parse(saved);if(d.date===today){checkedTasks=d.checks||{};}else{checkedTasks={};saveState();}}
  }catch(e){}
}

function saveState(){
  try{localStorage.setItem('blueprint_state',JSON.stringify({date:today,checks:checkedTasks}));}catch(e){}
}

function loadTheme(){
  try{const t=localStorage.getItem('blueprint_theme');if(t)document.body.dataset.theme=t;updateThemeBtn();}catch(e){}
}

function toggleTheme(){
  const t=document.body.dataset.theme==='dark'?'light':'dark';
  document.body.dataset.theme=t;
  try{localStorage.setItem('blueprint_theme',t);}catch(e){}
  updateThemeBtn();initParticles();
}

function updateThemeBtn(){
  document.getElementById('themeToggle').textContent=document.body.dataset.theme==='dark'?'☀️':'🌙';
}

// ─── Progress ───
function shootCanvasFlames(gifEl){
  const rect=gifEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;

  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:200;';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');

  const maxR=90;

  // Irregular edge points — gives the sphere a jagged, organic boundary
  const edgePts=Array.from({length:24},(_,i)=>{
    const a=(Math.PI*2*i/24);
    const jitter=0.75+Math.random()*0.5;
    return{a,jitter};
  });

  // Wispy tendrils erupting from the edge
  const wisps=Array.from({length:16},()=>({
    a:Math.random()*Math.PI*2,
    len:18+Math.random()*42,
    w:1.2+Math.random()*2.8,
    wobble:(Math.random()-0.5)*22,
    phase:Math.random()*0.2,
    color:['#ffffff','#a5b4fc','#06b6d4','#4f6df5'][Math.floor(Math.random()*4)],
  }));

  // Debris particles flying outward
  const debris=Array.from({length:20},()=>({
    a:Math.random()*Math.PI*2,
    speed:45+Math.random()*70,
    size:1.5+Math.random()*3,
    color:Math.random()>0.5?'#ffffff':'#4f6df5',
  }));

  const t0=performance.now(), dur=650;

  function easeOut(t){return 1-Math.pow(1-t,2.5);}

  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    if(t>=1){canvas.remove();return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.lineCap='round'; ctx.lineJoin='round';

    const e=easeOut(t);
    const r=maxR*e;
    const fade=t<0.6?1:1-(t-0.6)/0.4;

    // ── Outer smoke shell (dark blue/black, irregular) ──
    ctx.beginPath();
    edgePts.forEach((p,i)=>{
      const rx=cx+Math.cos(p.a)*r*p.jitter;
      const ry=cy+Math.sin(p.a)*r*p.jitter;
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    });
    ctx.closePath();
    const smokeGrad=ctx.createRadialGradient(cx,cy,r*0.35,cx,cy,r*1.05);
    smokeGrad.addColorStop(0,'rgba(0,0,0,0)');
    smokeGrad.addColorStop(0.5,`rgba(5,10,40,${fade*0.55})`);
    smokeGrad.addColorStop(0.82,`rgba(10,20,80,${fade*0.45})`);
    smokeGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=smokeGrad; ctx.globalAlpha=1; ctx.fill();

    // ── Mid energy sphere (blue glow) ──
    const midGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.82);
    midGrad.addColorStop(0,`rgba(200,220,255,${fade*0.9})`);
    midGrad.addColorStop(0.25,`rgba(99,102,241,${fade*0.75})`);
    midGrad.addColorStop(0.6,`rgba(30,60,180,${fade*0.45})`);
    midGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=midGrad; ctx.globalAlpha=1;
    ctx.beginPath(); ctx.arc(cx,cy,r*0.82,0,Math.PI*2); ctx.fill();

    // ── Bright white core (fades quickest) ──
    const coreA=Math.max(0,fade-(t*1.2));
    if(coreA>0){
      const coreGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.42);
      coreGrad.addColorStop(0,`rgba(255,255,255,${coreA})`);
      coreGrad.addColorStop(0.5,`rgba(180,200,255,${coreA*0.7})`);
      coreGrad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=coreGrad; ctx.globalAlpha=1;
      ctx.beginPath(); ctx.arc(cx,cy,r*0.42,0,Math.PI*2); ctx.fill();
    }

    // ── Bright irregular rim ──
    ctx.beginPath();
    edgePts.forEach((p,i)=>{
      const rx=cx+Math.cos(p.a)*r*p.jitter*0.88;
      const ry=cy+Math.sin(p.a)*r*p.jitter*0.88;
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    });
    ctx.closePath();
    ctx.strokeStyle=`rgba(180,210,255,${fade*0.8})`;
    ctx.lineWidth=2.5;
    ctx.shadowColor='#4f6df5'; ctx.shadowBlur=14;
    ctx.globalAlpha=fade; ctx.stroke();
    ctx.shadowBlur=0;

    // ── Wispy tendrils at edge ──
    wisps.forEach(w=>{
      if(t<w.phase)return;
      const ft=Math.min((t-w.phase)/(1-w.phase),1);
      const base=r*0.8;
      const sx=cx+Math.cos(w.a)*base;
      const sy=cy+Math.sin(w.a)*base;
      const tipLen=w.len*ft;
      const ex=cx+Math.cos(w.a)*(base+tipLen)+w.wobble*ft;
      const ey=cy+Math.sin(w.a)*(base+tipLen)+w.wobble*ft*0.5;
      const a2=(ft<0.4?ft/0.4:1-(ft-0.4)/0.6)*fade;
      ctx.globalAlpha=a2*0.85;
      ctx.shadowColor=w.color; ctx.shadowBlur=6;
      ctx.strokeStyle=w.color; ctx.lineWidth=w.w*(1-ft*0.6);
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
      // tip glow
      ctx.beginPath(); ctx.arc(ex,ey,w.w*0.7,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.globalAlpha=a2*0.7; ctx.fill();
    });

    // ── Flying debris ──
    debris.forEach(d=>{
      const dist=d.speed*e;
      const dx=cx+Math.cos(d.a)*dist, dy=cy+Math.sin(d.a)*dist;
      ctx.beginPath(); ctx.arc(dx,dy,d.size*(1-t*0.5),0,Math.PI*2);
      ctx.fillStyle=d.color; ctx.globalAlpha=fade*0.75; ctx.fill();
    });

    ctx.shadowBlur=0; ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function updateProgress(){
  const schedule=S[activeTab];
  if(!schedule)return;
  const total=schedule.length;
  const done=schedule.filter((_,i)=>checkedTasks[activeTab+'_'+i]).length;
  const pct=Math.round((done/total)*100);

  let grade='Unranked';
  let gradeColor='var(--text-muted)';
  if(pct>=100){grade='Special Grade ✦';gradeColor='#ec4899';}
  else if(pct>=75){grade='Grade 1';gradeColor='#7c3aed';}
  else if(pct>=50){grade='Grade 2';gradeColor='#4f6df5';}
  else if(pct>=25){grade='Grade 4';gradeColor='var(--text-muted)';}

  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressPct').style.color=gradeColor;
  document.getElementById('progressDetail').innerHTML=`${done}/${total} tasks &nbsp;·&nbsp; <span style="color:${gradeColor};font-weight:700">${grade}</span>`;

  // Scale + burst the cursed energy GIF — 28px at 0%, 112px at 100%
  const gif=document.getElementById('cursedEnergyGif');
  const pctBadge=document.getElementById('progressPct');
  if(gif){
    const size=Math.round(28+(pct/100)*84);
    gif.style.width=size+'px';
    gif.style.height=size+'px';

    // Completely hidden at 0%
    gif.style.opacity = pct === 0 ? '0' : '1';
    gif.style.visibility = pct === 0 ? 'hidden' : 'visible';

    // Burst + canvas flames when progress increases
    if(pct > _lastPct && pct > 0){
      gif.classList.remove('gif-burst');
      void gif.offsetWidth;
      gif.classList.add('gif-burst');
      setTimeout(()=>gif.classList.remove('gif-burst'), 700);
      shootCanvasFlames(gif);
    }

    let glowColor='rgba(99,102,241,0.4)';
    if(pct>=100){gif.style.filter='brightness(1.15) saturate(1.6) drop-shadow(0 0 14px #ec4899)';glowColor='rgba(236,72,153,0.7)';}
    else if(pct>=75){gif.style.filter='brightness(1.05) saturate(1.4) drop-shadow(0 0 10px #7c3aed)';glowColor='rgba(124,58,237,0.6)';}
    else if(pct>=50){gif.style.filter='brightness(0.92) saturate(1.3) drop-shadow(0 0 8px #4f6df5)';glowColor='rgba(79,109,245,0.5)';}
    else if(pct>=25){gif.style.filter='brightness(0.82) saturate(1.2) drop-shadow(0 0 5px #4f6df5)';glowColor='rgba(79,109,245,0.35)';}
    else gif.style.filter='brightness(0.65) saturate(1.0)';

    if(pctBadge){
      pctBadge.style.borderColor=glowColor;
      pctBadge.style.boxShadow=`0 0 10px ${glowColor}`;
      pctBadge.style.textShadow=`0 0 8px ${glowColor}`;
    }
  }
  _lastPct=pct;

  if(pct===100&&done>0)triggerDomain();
}

function triggerDomain(){
  const msg=DOMAIN_MSGS[Math.floor(Math.random()*DOMAIN_MSGS.length)];
  document.getElementById('domainMain').textContent=msg.main;
  document.getElementById('domainJp').textContent=msg.jp;
  document.getElementById('domainCn').textContent=msg.cn;
  document.getElementById('domainEn').textContent=msg.en;

  // Reset state
  const overlay=document.getElementById('domainOverlay');
  const content=document.getElementById('domainContent');
  const announce=document.getElementById('domainAnnounce');
  const main=document.getElementById('domainMain');
  const jp=document.getElementById('domainJp');
  const cn=document.getElementById('domainCn');
  const en=document.getElementById('domainEn');
  const closeBtn=document.getElementById('domainCloseBtn');
  [content,announce,main,jp,cn,en,closeBtn].forEach(el=>{
    el.classList.remove('visible','snap','show');
  });

  overlay.classList.add('active');

  // Phase 1 — geometric rings draw from center (0–500ms)
  const canvas=document.getElementById('domainCanvas');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const cx=canvas.width/2, cy=canvas.height/2;
  const maxR=Math.hypot(cx,cy)*1.1;
  const t0=performance.now();
  const phase1Dur=500, phase2Dur=1000;

  function drawRings(now){
    const t=Math.min((now-t0)/phase1Dur,1);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Void background fills in
    ctx.fillStyle=`rgba(0,0,0,${t*0.6})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Concentric rings drawing outward
    const numRings=6;
    for(let r=0;r<numRings;r++){
      const ringR=(maxR*(r+1)/numRings)*t;
      const alpha=(1-(r/numRings))*0.4*t;
      ctx.beginPath();
      ctx.arc(cx,cy,ringR,0,Math.PI*2);
      ctx.strokeStyle=`rgba(99,102,241,${alpha})`;
      ctx.lineWidth=1;
      ctx.stroke();
    }

    // Radial lines tracing outward
    const numLines=12;
    for(let l=0;l<numLines;l++){
      const angle=(Math.PI*2*l/numLines);
      const len=maxR*t;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(angle)*len, cy+Math.sin(angle)*len);
      ctx.strokeStyle=`rgba(79,109,245,${0.15*t})`;
      ctx.lineWidth=0.5;
      ctx.stroke();
    }

    if(t<1){requestAnimationFrame(drawRings);}
    else{startPhase2(now);}
  }
  requestAnimationFrame(drawRings);

  // Phase 2 — void forms with energy streams (500–1500ms)
  function startPhase2(startNow){
    const t2=performance.now();
    const streams=Array.from({length:18},()=>({
      angle:Math.random()*Math.PI*2,
      speed:0.4+Math.random()*0.6,
      length:0.3+Math.random()*0.5,
      alpha:0.2+Math.random()*0.4,
      offset:Math.random(),
    }));

    function drawPhase2(now){
      const t=Math.min((now-t2)/phase2Dur,1);
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Deep void bg
      const bgGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
      bgGrad.addColorStop(0,`rgba(12,8,30,${0.85+t*0.1})`);
      bgGrad.addColorStop(0.5,`rgba(5,3,18,0.97)`);
      bgGrad.addColorStop(1,'rgba(0,0,0,1)');
      ctx.fillStyle=bgGrad;
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // Concentric rings (settled)
      const numRings=6;
      for(let r=0;r<numRings;r++){
        const ringR=maxR*(r+1)/numRings;
        const alpha=(1-(r/numRings))*0.25;
        ctx.beginPath();
        ctx.arc(cx,cy,ringR,0,Math.PI*2);
        ctx.strokeStyle=`rgba(99,102,241,${alpha})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }

      // Energy streams flowing outward
      streams.forEach(s=>{
        const phase=(t*s.speed+s.offset)%1;
        const startR=maxR*phase*0.9;
        const endR=Math.min(startR+maxR*s.length*0.3, maxR);
        const sx=cx+Math.cos(s.angle)*startR;
        const sy=cy+Math.sin(s.angle)*startR;
        const ex=cx+Math.cos(s.angle)*endR;
        const ey=cy+Math.sin(s.angle)*endR;
        const streamGrad=ctx.createLinearGradient(sx,sy,ex,ey);
        streamGrad.addColorStop(0,'rgba(99,102,241,0)');
        streamGrad.addColorStop(0.4,`rgba(99,102,241,${s.alpha*t})`);
        streamGrad.addColorStop(1,'rgba(236,72,153,0)');
        ctx.beginPath();
        ctx.moveTo(sx,sy);
        ctx.lineTo(ex,ey);
        ctx.strokeStyle=streamGrad;
        ctx.lineWidth=1.5;
        ctx.stroke();
      });

      // Center glow building up
      const centerGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,80*t);
      centerGrad.addColorStop(0,`rgba(139,92,246,${0.3*t})`);
      centerGrad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=centerGrad;
      ctx.beginPath();
      ctx.arc(cx,cy,80*t,0,Math.PI*2);
      ctx.fill();

      if(t<1){requestAnimationFrame(drawPhase2);}
      else{startPhase3();}
    }
    requestAnimationFrame(drawPhase2);
  }

  // Phase 3 — kanji snaps in (1500ms+), then text stagger
  function startPhase3(){
    content.classList.add('visible');
    setTimeout(()=>announce.classList.add('snap'),80);
    setTimeout(()=>main.classList.add('show'),700);
    setTimeout(()=>jp.classList.add('show'),900);
    setTimeout(()=>cn.classList.add('show'),1050);
    setTimeout(()=>en.classList.add('show'),1200);
    setTimeout(()=>closeBtn.classList.add('show'),1400);

    // Phase 4 — settle canvas to ambient
    const t4=performance.now();
    const streams=Array.from({length:14},()=>({
      angle:Math.random()*Math.PI*2,
      speed:0.15+Math.random()*0.2,
      length:0.25+Math.random()*0.4,
      alpha:0.12+Math.random()*0.2,
      offset:Math.random(),
    }));
    function drawAmbient(now){
      if(!document.getElementById('domainOverlay').classList.contains('active'))return;
      const t=Math.min((now-t4)/3000,1);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const bgGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
      bgGrad.addColorStop(0,'rgba(14,10,35,0.95)');
      bgGrad.addColorStop(1,'rgba(0,0,0,1)');
      ctx.fillStyle=bgGrad;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      const numRings=6;
      for(let r=0;r<numRings;r++){
        ctx.beginPath();
        ctx.arc(cx,cy,maxR*(r+1)/numRings,0,Math.PI*2);
        ctx.strokeStyle=`rgba(99,102,241,${(1-(r/numRings))*0.18})`;
        ctx.lineWidth=0.8; ctx.stroke();
      }
      streams.forEach(s=>{
        const phase=((now/4000)*s.speed+s.offset)%1;
        const startR=maxR*phase;
        const endR=Math.min(startR+maxR*s.length*0.25,maxR);
        const sx=cx+Math.cos(s.angle)*startR, sy=cy+Math.sin(s.angle)*startR;
        const ex=cx+Math.cos(s.angle)*endR,   ey=cy+Math.sin(s.angle)*endR;
        const g=ctx.createLinearGradient(sx,sy,ex,ey);
        g.addColorStop(0,'rgba(99,102,241,0)');
        g.addColorStop(0.5,`rgba(99,102,241,${s.alpha})`);
        g.addColorStop(1,'rgba(236,72,153,0)');
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
        ctx.strokeStyle=g;ctx.lineWidth=1;ctx.stroke();
      });
      requestAnimationFrame(drawAmbient);
    }
    requestAnimationFrame(drawAmbient);
  }
}

function closeDomain(){
  document.getElementById('domainOverlay').classList.remove('active');
  const ctx=document.getElementById('domainCanvas').getContext('2d');
  ctx.clearRect(0,0,document.getElementById('domainCanvas').width,document.getElementById('domainCanvas').height);
}

// ─── Render ───
function renderTabs(){
  const c=document.getElementById('tabs');
  c.innerHTML=TABS.map(t=>`<button class="tab ${t.key===activeTab?'active':''}" data-key="${t.key}">${t.label}</button>`).join('');
  c.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{activeTab=b.dataset.key;renderTabs();renderContent();updateProgress();}));
}

function renderBlock(b,i){
  const s=TYPE_MAP[b.tp];
  const key=activeTab+'_'+i;
  const done=checkedTasks[key];
  const same=b.g===b.o;
  const act=same?b.g:`<span class="person-label">G:</span> ${b.g}<br><span class="person-label">O:</span> ${b.o}`;
  return `<div class="block ${s.cls}" style="animation-delay:${i*0.03}s">
    <div class="block-header">
      <span class="block-icon">${b.i}</span>
      <div class="block-content" onclick="toggleNote(${i})">
        <div class="block-meta">
          <span class="block-time">${b.t}</span>
          <span class="block-type">${s.label}</span>
        </div>
        <div class="block-activity">${act}</div>
      </div>
      <div class="block-actions">
        <div class="check-btn-wrap"><button class="check-btn ${done?'done':''}" data-check-key="${key}" onclick="toggleCheck('${key}',${i})">${done?'✓':''}</button></div>
        <span class="block-chevron" id="chev-${i}" onclick="toggleNote(${i})">▾</span>
      </div>
    </div>
    <div class="block-note" id="note-${i}" style="border-top: 1px solid currentColor; border-top-color: inherit; opacity: 0.15;">${b.n}</div>
  </div>`;
}

function toggleNote(i){
  const n=document.getElementById('note-'+i);
  const c=document.getElementById('chev-'+i);
  if(!n)return;
  n.classList.toggle('open');
  if(n.classList.contains('open'))n.style.opacity='0.7';else n.style.opacity='0.15';
  c.classList.toggle('open');
}

function triggerBlackFlash(btn){
  // Audio
  try{const a=new Audio('kokusen.wav');a.volume=1.0;a.play().catch(()=>{});}catch(e){}

  // Screen flash
  const screen=document.createElement('div');
  screen.className='bf-screen';
  document.body.appendChild(screen);
  setTimeout(()=>screen.remove(),450);

  // Kanji label above button
  const wrap=btn.closest('.check-btn-wrap');
  if(wrap){
    const label=document.createElement('div');
    label.className='bf-label';
    label.textContent='黒閃';
    wrap.appendChild(label);
    setTimeout(()=>label.remove(),850);
  }

  // Canvas-based recursive lightning
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;

  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:9991;';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');

  // Pre-generate bolt configs so they stay stable between glow + core passes
  const boltDefs=Array.from({length:12},(_,i)=>({
    angle:(Math.PI*2*i/12)+(Math.random()-0.5)*0.45,
    len:55+Math.random()*95,
    hasBranch:Math.random()>0.4,
    branchOffset:(Math.random()-0.5)*1.1,
    branchFrac:0.3+Math.random()*0.35,
    branchLen:20+Math.random()*50,
  }));

  // Debris splatter
  const debris=Array.from({length:22},()=>({
    angle:Math.random()*Math.PI*2,
    speed:35+Math.random()*90,
    w:2+Math.random()*5,
    h:1+Math.random()*2.5,
    alpha:0.55+Math.random()*0.45,
  }));

  function boltPath(x1,y1,x2,y2,disp){
    if(disp<2.5){ctx.lineTo(x2,y2);return;}
    const mx=(x1+x2)/2+(Math.random()-0.5)*disp;
    const my=(y1+y2)/2+(Math.random()-0.5)*disp;
    boltPath(x1,y1,mx,my,disp/2);
    boltPath(mx,my,x2,y2,disp/2);
  }

  const t0=performance.now();
  const dur=820;

  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    if(t>=1){canvas.remove();return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const intensity=t<0.18?t/0.18:Math.pow(1-(t-0.18)/0.82,1.4);
    const grow=Math.min(t/0.38,1);

    // Center burst
    const br=14+38*t;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,br);
    g.addColorStop(0,`rgba(255,255,255,${intensity*0.95})`);
    g.addColorStop(0.2,`rgba(255,90,90,${intensity*0.85})`);
    g.addColorStop(0.55,`rgba(180,0,0,${intensity*0.5})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,cy,br,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();

    // Lightning bolts — each frame re-runs boltPath for natural flicker
    boltDefs.forEach(bd=>{
      const len=bd.len*grow;
      const ex=cx+Math.cos(bd.angle)*len;
      const ey=cy+Math.sin(bd.angle)*len;

      // Red glow pass
      ctx.beginPath();ctx.moveTo(cx,cy);
      boltPath(cx,cy,ex,ey,len*0.38);
      ctx.strokeStyle=`rgba(200,0,0,${intensity*0.55})`;
      ctx.lineWidth=4.5;
      ctx.shadowColor='#cc0000';ctx.shadowBlur=10;
      ctx.globalAlpha=1;ctx.stroke();

      // White core pass
      ctx.beginPath();ctx.moveTo(cx,cy);
      boltPath(cx,cy,ex,ey,len*0.32);
      ctx.strokeStyle=`rgba(255,255,255,${intensity*0.92})`;
      ctx.lineWidth=1.3;
      ctx.shadowColor='#ffffff';ctx.shadowBlur=5;
      ctx.stroke();

      // Branch
      if(bd.hasBranch&&grow>0.25){
        const bpx=cx+Math.cos(bd.angle)*len*bd.branchFrac;
        const bpy=cy+Math.sin(bd.angle)*len*bd.branchFrac;
        const ba=bd.angle+bd.branchOffset;
        const bex=bpx+Math.cos(ba)*bd.branchLen*grow;
        const bey=bpy+Math.sin(ba)*bd.branchLen*grow;
        ctx.beginPath();ctx.moveTo(bpx,bpy);
        boltPath(bpx,bpy,bex,bey,12);
        ctx.strokeStyle=`rgba(255,80,80,${intensity*0.65})`;
        ctx.lineWidth=1;ctx.shadowColor='#ff4444';ctx.shadowBlur=5;
        ctx.stroke();
      }
    });

    ctx.shadowBlur=0;

    // Black debris particles
    debris.forEach(p=>{
      const d=p.speed*t;
      ctx.beginPath();
      ctx.ellipse(cx+Math.cos(p.angle)*d,cy+Math.sin(p.angle)*d,p.w,p.h,p.angle,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,0,0,${p.alpha*intensity})`;
      ctx.globalAlpha=1;ctx.fill();
    });

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ─── Cursed Energy Wisps ───
let _particleAnimId=null;
function initParticles(){
  if(_particleAnimId)cancelAnimationFrame(_particleAnimId);
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const isDark=document.body.dataset.theme!=='light';
  const W=canvas.width, H=canvas.height;

  // Each wisp is a bezier curve segment that drifts upward
  const count=isDark?22:16;
  const wisps=Array.from({length:count},()=>createWisp(W,H,isDark,true));

  function createWisp(W,H,dark,randomY){
    const x=Math.random()*W;
    const y=randomY?(Math.random()*H):(H+20);
    const len=40+Math.random()*80;
    const wobble=(Math.random()-0.5)*60;
    const speed=0.3+Math.random()*0.5;
    const alpha=dark?(0.15+Math.random()*0.25):(0.12+Math.random()*0.18);
    const hue=dark?(220+Math.random()*60):(35+Math.random()*25); // blue-purple or gold
    const width=0.8+Math.random()*1.4;
    return {x,y,len,wobble,speed,alpha,hue,width,life:Math.random()};
  }

  function draw(now){
    ctx.clearRect(0,0,W,H);

    // Faint radial glow at center (energy source)
    if(isDark){
      const cg=ctx.createRadialGradient(W/2,H*0.45,0,W/2,H*0.45,W*0.4);
      cg.addColorStop(0,'rgba(79,109,245,0.04)');
      cg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);
    }

    wisps.forEach((w,idx)=>{
      w.y-=w.speed;
      w.life+=w.speed/H;

      // Fade in at bottom, fade out at top
      const fadeIn=Math.min(w.life*8,1);
      const fadeOut=Math.max(0,1-Math.max(0,(H-w.y-60)/100));
      const a=w.alpha*fadeIn*(1-fadeOut);

      if(w.y+w.len<0||a<=0){
        wisps[idx]=createWisp(W,H,isDark,false);
        return;
      }

      const wobbleX=Math.sin(now*0.0008+idx*1.3)*w.wobble;
      const x0=w.x+wobbleX*0.3;
      const y0=w.y+w.len;
      const cp1x=x0+wobbleX*0.5;
      const cp1y=y0-w.len*0.4;
      const cp2x=x0+wobbleX;
      const cp2y=y0-w.len*0.75;
      const x1=x0+wobbleX*1.2;
      const y1=w.y;

      const grad=ctx.createLinearGradient(x0,y0,x1,y1);
      if(isDark){
        grad.addColorStop(0,`hsla(${w.hue},80%,65%,0)`);
        grad.addColorStop(0.3,`hsla(${w.hue},80%,65%,${a})`);
        grad.addColorStop(0.8,`hsla(${w.hue+20},75%,70%,${a*0.6})`);
        grad.addColorStop(1,`hsla(${w.hue+40},70%,75%,0)`);
      } else {
        grad.addColorStop(0,`hsla(${w.hue},90%,55%,0)`);
        grad.addColorStop(0.3,`hsla(${w.hue},90%,55%,${a})`);
        grad.addColorStop(1,`hsla(${w.hue},85%,60%,0)`);
      }

      ctx.beginPath();
      ctx.moveTo(x0,y0);
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x1,y1);
      ctx.strokeStyle=grad;
      ctx.lineWidth=w.width;
      ctx.lineCap='round';
      ctx.stroke();
    });

    _particleAnimId=requestAnimationFrame(draw);
  }
  _particleAnimId=requestAnimationFrame(draw);
}
