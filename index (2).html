<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>George & Olivia — Daily Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --bg2: #12121f;
  --bg3: #1a1a2e;
  --text: #e8e8f0;
  --text-muted: #8888a8;
  --cursed-blue: #4f6df5;
  --cursed-purple: #7c3aed;
  --cursed-glow: #6366f1;
  --rika-pink: #ec4899;
  --energy-green: #10b981;
  --warning-amber: #f59e0b;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --accent: var(--cursed-blue);
  --glow: 0 0 30px rgba(99,102,241,0.15);
}

[data-theme="light"] {
  --bg: #f5f3f0;
  --bg2: #ebe8e4;
  --bg3: #ddd9d4;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --card-bg: rgba(255,255,255,0.7);
  --card-border: rgba(0,0,0,0.08);
  --glow: 0 0 30px rgba(99,102,241,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', 'Zen Kaku Gothic New', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s, color 0.4s;
  overflow-x: hidden;
}

/* ─── Header ─── */
.header { text-align: center; margin-bottom: 24px; }

.header .cursed-label {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--cursed-blue); font-weight: 700; margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(79,109,245,0.5);
}

.header h1 {
  font-size: 28px; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--cursed-blue), var(--cursed-purple), var(--rika-pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  font-size: 13px; opacity: 0.5; line-height: 1.5;
  max-width: 400px; margin: 0 auto;
}

/* ─── Theme Toggle ─── */
.theme-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg3); border: 1.5px solid var(--card-border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: all 0.3s;
  box-shadow: var(--glow);
}
.theme-toggle:hover { transform: scale(1.1); }

/* ─── Tabs ─── */
.tabs {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 20px;
}

.tab {
  padding: 8px 14px; border-radius: 99px;
  border: 1.5px solid var(--card-border);
  background: var(--card-bg); color: var(--text);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}

.tab:hover { border-color: var(--cursed-blue); }

.tab.active {
  border-color: var(--cursed-blue);
  background: var(--cursed-blue); color: #fff;
  box-shadow: 0 0 20px rgba(79,109,245,0.3);
}

/* ─── Yuta Companion ─── */
.yuta-bar {
  background: linear-gradient(135deg, rgba(79,109,245,0.12), rgba(124,58,237,0.08));
  border: 1.5px solid rgba(79,109,245,0.2);
  border-radius: 16px; padding: 14px 18px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--glow); transition: all 0.3s;
  animation: fadeUp 0.5s ease;
}

.yuta-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cursed-blue), var(--cursed-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  box-shadow: 0 0 15px rgba(99,102,241,0.4);
  animation: pulse 3s ease infinite;
}

.yuta-text { flex: 1; min-width: 0; }
.yuta-text .name { font-size: 11px; font-weight: 700; color: var(--cursed-blue); letter-spacing: 1px; text-transform: uppercase; }
.yuta-text .quote { font-size: 13px; line-height: 1.5; margin-top: 2px; }
.yuta-text .quote-sub { font-size: 11px; opacity: 0.5; margin-top: 4px; line-height: 1.4; }

/* ─── Progress Ring ─── */
.progress-section {
  display: flex; align-items: center; gap: 16px;
  background: var(--card-bg); border: 1.5px solid var(--card-border);
  border-radius: 16px; padding: 16px 18px; margin-bottom: 20px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.progress-ring-container { position: relative; width: 64px; height: 64px; flex-shrink: 0; }

.progress-ring { transform: rotate(-90deg); }

.progress-ring-bg { fill: none; stroke: var(--card-border); stroke-width: 5; }
.progress-ring-fill {
  fill: none; stroke: url(#grad); stroke-width: 5;
  stroke-linecap: round; transition: stroke-dashoffset 0.6s ease;
}

.progress-pct {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 16px; font-weight: 800; color: var(--cursed-blue);
}

.progress-info { flex: 1; }
.progress-info .label { font-size: 12px; font-weight: 700; color: var(--cursed-blue); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.progress-info .detail { font-size: 13px; opacity: 0.6; line-height: 1.4; }

/* ─── Schedule Blocks ─── */
.schedule { display: flex; flex-direction: column; gap: 6px; }

.plan-info {
  margin-bottom: 14px; padding: 12px 16px; border-radius: 12px;
  font-size: 13px; line-height: 1.6; animation: fadeUp 0.4s ease;
  background: var(--card-bg); border: 1.5px solid var(--card-border);
}

.plan-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 6px; font-size: 12px; }
.plan-meta .plan-label { font-weight: 700; color: var(--cursed-blue); }
.plan-meta span { opacity: 0.5; }

.block {
  border-radius: 14px; padding: 14px 16px;
  cursor: pointer; transition: all 0.2s;
  animation: fadeUp 0.4s ease both;
}

.block:active { transform: scale(0.985); }

.block-header { display: flex; align-items: center; gap: 10px; }
.block-icon { font-size: 20px; flex-shrink: 0; }
.block-content { flex: 1; min-width: 0; }
.block-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; flex-wrap: wrap; }
.block-time { font-size: 11px; font-weight: 700; flex-shrink: 0; }

.block-type {
  font-size: 9px; padding: 2px 7px; border-radius: 99px;
  color: #fff; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}

.block-activity { font-size: 13px; font-weight: 500; line-height: 1.5; }
.person-label { opacity: 0.5; font-size: 11px; }

.block-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.check-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--card-border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.3s; color: var(--text);
}

.check-btn.done {
  border-color: var(--energy-green); background: var(--energy-green); color: #fff;
  box-shadow: 0 0 12px rgba(16,185,129,0.4);
  animation: checkPop 0.4s ease;
}

.block-chevron {
  font-size: 16px; opacity: 0.25; transition: transform 0.25s; flex-shrink: 0;
}
.block-chevron.open { transform: rotate(180deg); }

.block-note {
  margin-top: 0; padding-top: 0; font-size: 12px; line-height: 1.6;
  opacity: 0.7; white-space: pre-line;
  max-height: 0; overflow: hidden; transition: all 0.35s ease;
}

.block-note.open { max-height: 500px; margin-top: 12px; padding-top: 12px; }

/* ─── Type Colors ─── */
.type-together { background: rgba(79,109,245,0.08); border: 1.5px solid rgba(79,109,245,0.2); }
.type-together .block-time { color: var(--cursed-blue); }
.type-together .block-type { background: var(--cursed-blue); }
.type-together .block-note { border-top-color: rgba(79,109,245,0.2); }

.type-solo { background: rgba(245,158,11,0.08); border: 1.5px solid rgba(245,158,11,0.2); }
.type-solo .block-time { color: var(--warning-amber); }
.type-solo .block-type { background: var(--warning-amber); }
.type-solo .block-note { border-top-color: rgba(245,158,11,0.2); }

.type-work { background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.06); }
.type-work .block-time { color: var(--text-muted); }
.type-work .block-type { background: var(--text-muted); }
.type-work .block-note { border-top-color: var(--card-border); }

.type-late { background: rgba(124,58,237,0.08); border: 1.5px solid rgba(124,58,237,0.2); }
.type-late .block-time { color: var(--cursed-purple); }
.type-late .block-type { background: var(--cursed-purple); }
.type-late .block-note { border-top-color: rgba(124,58,237,0.2); }

.type-flex { background: rgba(236,72,153,0.08); border: 1.5px solid rgba(236,72,153,0.2); }
.type-flex .block-time { color: var(--rika-pink); }
.type-flex .block-type { background: var(--rika-pink); }
.type-flex .block-note { border-top-color: rgba(236,72,153,0.2); }

/* ─── Rules & Protocols ─── */
.section-title {
  font-size: 20px; font-weight: 800; margin: 0 0 8px;
  color: var(--cursed-blue);
  text-shadow: 0 0 20px rgba(79,109,245,0.2);
}

.rule-card {
  padding: 14px 16px; border-radius: 14px;
  background: var(--card-bg); border: 1.5px solid var(--card-border);
  margin-bottom: 8px; animation: fadeUp 0.4s ease both;
}

.rule-title { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.rule-title .icon { font-size: 20px; }
.rule-title .name { font-size: 14px; font-weight: 700; }

.rule-desc { font-size: 12.5px; line-height: 1.6; opacity: 0.7; }

.protocol-card {
  padding: 14px 16px; border-radius: 14px;
  background: rgba(16,185,129,0.05); border: 1.5px solid rgba(16,185,129,0.15);
  margin-bottom: 8px; animation: fadeUp 0.4s ease both;
}

.protocol-steps { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.protocol-step { display: flex; gap: 8px; font-size: 12.5px; line-height: 1.5; }
.protocol-step .num { color: var(--energy-green); font-weight: 700; flex-shrink: 0; }
.protocol-step .text { opacity: 0.7; }

/* ─── Screen Time ─── */
.screen-time-card {
  background: linear-gradient(135deg, rgba(236,72,153,0.08), rgba(124,58,237,0.08));
  border: 1.5px solid rgba(236,72,153,0.2);
  border-radius: 16px; padding: 18px; margin-top: 16px;
  animation: fadeUp 0.5s ease;
}

.screen-time-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--rika-pink); }

.st-inputs { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }

.st-input-group { flex: 1; min-width: 120px; }
.st-input-group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

.st-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid var(--card-border); background: var(--card-bg);
  color: var(--text); font-family: inherit; font-size: 16px; font-weight: 600;
  text-align: center; outline: none; transition: border-color 0.2s;
}
.st-input:focus { border-color: var(--rika-pink); }

.st-result {
  text-align: center; font-size: 14px; font-weight: 600;
  padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.03);
  min-height: 40px; display: flex; align-items: center; justify-content: center;
}

/* ─── Decision Tree ─── */
.decision-card {
  margin-top: 16px; padding: 20px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(79,109,245,0.08), rgba(124,58,237,0.08));
  border: 1.5px solid rgba(79,109,245,0.2);
  box-shadow: var(--glow);
}

.decision-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--cursed-blue); }
.tree-item { font-size: 13px; line-height: 1.8; opacity: 0.8; margin-bottom: 6px; }

/* ─── Domain Expansion Overlay ─── */
.domain-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9999; display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.95);
}

.domain-overlay.active { display: flex; }

.domain-content {
  text-align: center; padding: 40px 24px;
  animation: domainExpand 1.2s ease;
}

.domain-title {
  font-size: 14px; letter-spacing: 6px; text-transform: uppercase;
  color: var(--cursed-blue); margin-bottom: 16px; font-weight: 700;
  text-shadow: 0 0 30px rgba(99,102,241,0.8);
  animation: flicker 2s ease infinite;
}

.domain-main {
  font-size: 36px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 3s ease infinite;
}

.domain-sub {
  font-size: 16px; opacity: 0.8; margin-bottom: 8px; color: #e8e8f0;
}

.domain-sub-jp { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 18px; color: var(--cursed-blue); margin-bottom: 4px; text-shadow: 0 0 20px rgba(99,102,241,0.5); }
.domain-sub-cn { font-family: 'Noto Sans SC', sans-serif; font-size: 16px; opacity: 0.6; margin-bottom: 4px; color: #c4b5fd; }
.domain-sub-en { font-size: 14px; opacity: 0.5; margin-bottom: 24px; color: #e8e8f0; }

.domain-close {
  padding: 12px 32px; border-radius: 99px; border: 2px solid var(--cursed-blue);
  background: transparent; color: var(--cursed-blue); font-family: inherit;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s;
  letter-spacing: 2px; text-transform: uppercase;
}
.domain-close:hover { background: var(--cursed-blue); color: #fff; }

/* ─── Animations ─── */
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 15px rgba(99,102,241,0.4); } 50% { box-shadow: 0 0 25px rgba(99,102,241,0.7); } }
@keyframes checkPop { 0% { transform:scale(1); } 50% { transform:scale(1.3); } 100% { transform:scale(1); } }
@keyframes domainExpand { 0% { opacity:0; transform:scale(0.5); } 50% { opacity:1; transform:scale(1.05); } 100% { transform:scale(1); } }
@keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
@keyframes gradientShift { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }

/* ─── Particle Canvas ─── */
#particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.4; }
body > *:not(#particles) { position:relative; z-index:1; }

/* ─── Black Flash ─── */
.check-btn-wrap { position:relative; display:inline-flex; align-items:center; justify-content:center; }

@keyframes bfBurst {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(0.2); box-shadow:0 0 0 6px #000, 0 0 12px 4px #8b0000; }
  35%  { opacity:1; transform:translate(-50%,-50%) scale(1);   box-shadow:0 0 0 3px #300, 0 0 35px 18px rgba(180,0,0,0.65); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(2.2); box-shadow:0 0 0 0 transparent, 0 0 60px 30px rgba(180,0,0,0); }
}
@keyframes bfRay {
  0%  { opacity:0; height:0; }
  25% { opacity:1; }
  55% { height:48px; opacity:0.85; }
  100%{ height:58px; opacity:0; }
}
@keyframes bfScreen {
  0%   { opacity:0.55; }
  100% { opacity:0; }
}
@keyframes bfLabel {
  0%   { opacity:0; transform:translate(-50%,-220%) scale(1.4); }
  25%  { opacity:1; transform:translate(-50%,-220%) scale(1); }
  75%  { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-220%) scale(0.8); }
}

.bf-screen {
  position:fixed; inset:0; background:#000;
  pointer-events:none; z-index:9990;
  animation:bfScreen 0.4s ease-out forwards;
}
.bf-burst {
  position:absolute; top:50%; left:50%;
  width:56px; height:56px; border-radius:50%;
  background:radial-gradient(circle, #000 0%, rgba(120,0,0,0.75) 45%, transparent 70%);
  pointer-events:none; z-index:50;
  animation:bfBurst 0.65s cubic-bezier(0.1,0,0.3,1) forwards;
}
.bf-ray {
  position:absolute; top:50%; left:50%;
  width:2px; height:0;
  transform-origin:50% 0%;
  background:linear-gradient(to bottom, #cc0000, rgba(180,0,0,0.3), transparent);
  pointer-events:none;
  animation:bfRay 0.65s ease-out forwards;
}
.bf-label {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-220%);
  font-size:8px; font-weight:900; letter-spacing:3px;
  color:#cc0000; white-space:nowrap;
  text-shadow:0 0 10px rgba(200,0,0,0.9);
  pointer-events:none; z-index:51;
  animation:bfLabel 0.65s ease-out forwards;
}
</style>
</head>
<body data-theme="dark">
<canvas id="particles"></canvas>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

<div class="header">
  <div class="cursed-label">✦ Daily Blueprint ✦</div>
  <h1>George & Olivia</h1>
  <div class="subtitle">Pick your day type. Everything gets done — the only question is when.</div>
</div>

<div class="yuta-bar" id="yutaBar">
  <div class="yuta-avatar">⚡</div>
  <div class="yuta-text">
    <div class="name">Yuta</div>
    <div class="quote" id="yutaQuote"></div>
    <div class="quote-sub" id="yutaSub"></div>
  </div>
</div>

<div class="progress-section" id="progressSection">
  <div class="progress-ring-container">
    <svg class="progress-ring" width="64" height="64" viewBox="0 0 64 64">
      <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#ec4899"/></linearGradient></defs>
      <circle class="progress-ring-bg" cx="32" cy="32" r="28"/>

    <div class="progress-pct" id="progressPct">0%</div>

  <div class="progress-info">

</div>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

<div class="domain-overlay" id="domainOverlay">
  <div class="domain-content">

    <button class="domain-close" onclick="closeDomain()">Continue</button>
  </div>
</div>

<script>
// ─── Data ───
const TABS=[{key:"earlyNormal",label:"Early Day"},{key:"earlyClimb",label:"Early + Climb/Dance"},{key:"lateNormal",label:"Late Day"},{key:"lateClimb",label:"Late + Climb/Dance"},{key:"friday",label:"Friday"},{key:"protocols",label:"Rules & Protocols"}];

const S={
earlyNormal:[

{t:"6:00–6:10",g:"Morning reset",o:"Morning reset",i:"🫧",tp:"together",n:"Splash water, brush teeth, gym clothes."},

// ─── State ───
let activeTab='earlyNormal';
let checkedTasks={};
let today=new Date().toDateString();

function loadState(){
  try{
    const saved=localStorage.getItem('blueprint_state');
    if(saved){const d=JSON.parse(saved);if(d.date===today){checkedTasks=d.checks||{};}else{checkedTasks={};saveState();}}
  }catch(e){}
}

function saveState(){
  try{localStorage.setItem('blueprint_state',JSON.stringify({date:today,checks:checkedTasks}));}catch(e){}
}

function loadTheme(){
  try{const t=localStorage.getItem('blueprint_theme');if(t)document.body.dataset.theme=t;updateThemeBtn();}catch(e){}
}

function toggleTheme(){
  const t=document.body.dataset.theme==='dark'?'light':'dark';
  document.body.dataset.theme=t;
  try{localStorage.setItem('blueprint_theme',t);}catch(e){}
  updateThemeBtn();initParticles();
}

function updateThemeBtn(){
  document.getElementById('themeToggle').textContent=document.body.dataset.theme==='dark'?'☀️':'🌙';
}

// ─── Progress ───
function updateProgress(){
  const schedule=S[activeTab];
  if(!schedule)return;
  const total=schedule.length;
  const done=schedule.filter((_,i)=>checkedTasks[activeTab+'_'+i]).length;
  const pct=Math.round((done/total)*100);
  const circ=175.9;
  const offset=circ-(circ*pct/100);
  document.getElementById('progressRing').style.strokeDashoffset=offset;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressDetail').textContent=done+'/'+total+' tasks complete'+(pct===100?' — DOMAIN EXPANDED!' : '');
  if(pct===100&&done>0)triggerDomain();
}

function triggerDomain(){
  const msg=DOMAIN_MSGS[Math.floor(Math.random()*DOMAIN_MSGS.length)];
  document.getElementById('domainMain').textContent=msg.main;
  document.getElementById('domainJp').textContent=msg.jp;
  document.getElementById('domainCn').textContent=msg.cn;
  document.getElementById('domainEn').textContent=msg.en;
  document.getElementById('domainOverlay').classList.add('active');
}

function closeDomain(){document.getElementById('domainOverlay').classList.remove('active');}

// ─── Render ───
function renderTabs(){
  const c=document.getElementById('tabs');
  c.innerHTML=TABS.map(t=>`<button class="tab ${t.key===activeTab?'active':''}" data-key="${t.key}">${t.label}</button>`).join('');
  c.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{activeTab=b.dataset.key;renderTabs();renderContent();updateProgress();}));
}

function renderBlock(b,i){
  const s=TYPE_MAP[b.tp];
  const key=activeTab+'_'+i;
  const done=checkedTasks[key];
  const same=b.g===b.o;
  const act=same?b.g:`<span class="person-label">G:</span> ${b.g}<br><span class="person-label">O:</span> ${b.o}`;
  return `<div class="block ${s.cls}" style="animation-delay:${i*0.03}s">
    <div class="block-header">
      <span class="block-icon">${b.i}</span>
      <div class="block-content" onclick="toggleNote(${i})">
        <div class="block-meta">
          <span class="block-time">${b.t}</span>
          <span class="block-type">${s.label}</span>
        </div>
        <div class="block-activity">${act}</div>
      </div>
      <div class="block-actions">
        <div class="check-btn-wrap"><button class="check-btn ${done?'done':''}" data-check-key="${key}" onclick="toggleCheck('${key}',${i})">${done?'✓':''}</button></div>
        <span class="block-chevron" id="chev-${i}" onclick="toggleNote(${i})">▾</span>
      </div>
    </div>
    <div class="block-note" id="note-${i}" style="border-top: 1px solid currentColor; border-top-color: inherit; opacity: 0.15;">${b.n}</div>
  </div>`;
}

function toggleNote(i){
  const n=document.getElementById('note-'+i);
  const c=document.getElementById('chev-'+i);
  if(!n)return;
  n.classList.toggle('open');
  if(n.classList.contains('open'))n.style.opacity='0.7';else n.style.opacity='0.15';
  c.classList.toggle('open');
}

function triggerBlackFlash(btn){
  const screen=document.createElement('div');
  screen.className='bf-screen';
  document.body.appendChild(screen);
  setTimeout(()=>screen.remove(),450);

  const wrap=btn.closest('.check-btn-wrap');
  if(!wrap)return;
  const burst=document.createElement('div');
  burst.className='bf-burst';
  [0,45,90,135,180,225,270,315].forEach(angle=>{
    const ray=document.createElement('div');
    ray.className='bf-ray';
    ray.style.transform=`translate(-50%,0%) rotate(${angle}deg)`;
    ray.style.animationDelay=`${Math.random()*0.04}s`;
    burst.appendChild(ray);
  });
  const label=document.createElement('div');
  label.className='bf-label';
  label.textContent='BLACK FLASH';
  burst.appendChild(label);
  wrap.appendChild(burst);
  setTimeout(()=>burst.remove(),700);
}

function toggleCheck(key,i){
  checkedTasks[key]=!checkedTasks[key];
  saveState();
  if(checkedTasks[key]){
    showTaskCheer();
    const btn=document.querySelector(`.check-btn[data-check-key="${key}"]`);
    if(btn){btn.classList.add('done');btn.textContent='✓';triggerBlackFlash(btn);}
    setTimeout(()=>{renderContent();updateProgress();},700);
  } else {
    renderContent();
    updateProgress();
  }
}

function renderContent(){
  const c=document.getElementById('content');

  if(activeTab==='protocols'){
    let h='';
    h+=`<h2 class="section-title">Ground Rules</h2>`;
    h+=RULES.map((r,i)=>`<div class="rule-card" style="animation-delay:${i*0.03}s"><div class="rule-title"><span class="icon">${r.i}</span><span class="name">${r.t}</span></div><div class="rule-desc">${r.d}</div></div>`).join('');
    h+=`<h2 class="section-title" style="margin-top:24px">If-Then Protocols</h2>`;
    h+=PROTOCOLS.map((p,i)=>`<div class="protocol-card" style="animation-delay:${i*0.03}s"><div class="rule-title"><span class="icon">${p.i}</span><span class="name">If: ${p.t}</span></div><div class="protocol-steps">${p.s.map((s,j)=>`<div class="protocol-step"><span class="num">${j+1}.</span><span class="text">${s}</span></div>`).join('')}</div></div>`).join('');

    h+=`<div class="screen-time-card"><h3>📱 Screen Time Challenge</h3><div class="st-inputs"><div class="st-input-group"><label>George (min)</label><input class="st-input" type="number" id="stGeorge" placeholder="0" oninput="calcScreenTime()"></div><div class="st-input-group"><label>Olivia (min)</label><input class="st-input" type="number" id="stOlivia" placeholder="0" oninput="calcScreenTime()"></div></div><div class="st-result" id="stResult">Enter your screen time to see who won</div></div>`;

    h+=`<div class="decision-card"><h3>📋 How to Pick Your Day</h3>${DECISION.map(d=>`<div class="tree-item"><strong>${d.l}</strong> → ${d.v}</div>`).join('')}</div>`;
    c.innerHTML=h;
    document.getElementById('progressSection').style.display='none';
    return;
  }

  document.getElementById('progressSection').style.display='flex';
  const schedule=S[activeTab];
  const info=PLAN_INFO[activeTab];

  let h=`<div class="plan-info"><div class="plan-meta"><span class="plan-label">${info.label}</span><span>Wake: ${info.wake}</span><span>Sleep: ${info.sleep}</span><span>${info.hours}</span></div>${info.desc}</div>`;
  h+=`<div class="schedule">${schedule.map((b,i)=>renderBlock(b,i)).join('')}</div>`;
  c.innerHTML=h;
}

function calcScreenTime(){
  const g=parseInt(document.getElementById('stGeorge').value)||0;
  const o=parseInt(document.getElementById('stOlivia').value)||0;
  const r=document.getElementById('stResult');
  if(g===0&&o===0){r.textContent='Enter your screen time to see who won';return;}
  if(g<o)r.innerHTML=`⚡ <strong>George wins!</strong> ${g} vs ${o} min — ${o-g} min less scrolling`;
  else if(o<g)r.innerHTML=`⚡ <strong>Olivia wins!</strong> ${o} vs ${g} min — ${g-o} min less scrolling`;
  else r.innerHTML=`🤝 <strong>Tie!</strong> Both at ${g} min — you're in sync`;
}

// ─── Particles ───
function initParticles(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const isDark=document.body.dataset.theme==='dark';
  const particles=[];
  const count=30;

  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2+0.5,
      dx:(Math.random()-0.5)*0.3,
      dy:(Math.random()-0.5)*0.3,
      alpha:Math.random()*0.5+0.1,
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=isDark?`rgba(99,102,241,${p.alpha})`:`rgba(99,102,241,${p.alpha*0.5})`;
      ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.x<0||p.x>canvas.width)p.dx*=-1;
      if(p.y<0||p.y>canvas.height)p.dy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

window.addEventListener('resize',()=>{
  const c=document.getElementById('particles');
  c.width=window.innerWidth;c.height=window.innerHeight;
});

// ─── Init ───
loadState();
loadTheme();
setYutaQuote();
renderTabs();
renderContent();
updateProgress();
initParticles();
</script>
